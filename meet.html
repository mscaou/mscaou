<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MSC Meeting Scheduler - Choose your interview type and book a slot">

    <title>MSC Meeting Scheduler</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

    <style>
        .landing-wrapper {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .landing-wrapper::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 70%;
            height: 140%;
            background: radial-gradient(ellipse, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .landing-wrapper::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 70%;
            height: 140%;
            background: radial-gradient(ellipse, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .landing-header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
            z-index: 1;
        }

        .landing-header .brand-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .landing-header h1 {
            font-size: 2.75rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .landing-header p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            max-width: 500px;
            margin: 0 auto;
        }

        .meeting-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .meeting-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        .meeting-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .meeting-card .card-icon {
            font-size: 4rem;
            margin-bottom: 1.25rem;
            display: inline-block;
            transition: transform 0.35s ease;
        }

        .meeting-card:hover .card-icon {
            transform: scale(1.15);
        }

        .meeting-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.75rem;
        }

        .meeting-card .card-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 1.75rem;
            line-height: 1.6;
        }

        .meeting-card .card-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            transition: all 0.25s ease;
        }

        .meeting-card:hover .card-btn {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        .card-btn .arrow {
            transition: transform 0.25s ease;
        }

        .meeting-card:hover .card-btn .arrow {
            transform: translateX(4px);
        }

        .landing-loading {
            text-align: center;
            padding: 3rem;
            position: relative;
            z-index: 1;
        }

        .landing-loading .spinner {
            border-top-color: #60a5fa;
            border-color: rgba(255, 255, 255, 0.15);
            border-top-color: #60a5fa;
            margin: 0 auto 1rem;
        }

        .landing-loading p {
            color: rgba(255, 255, 255, 0.5);
        }

        .landing-empty {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 1;
        }

        .landing-empty .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .landing-empty h3 {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.5rem;
        }

        .landing-footer {
            margin-top: 3rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .landing-footer p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.875rem;
        }

        .landing-footer a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .landing-footer a:hover {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: underline;
        }

        @media (max-width: 700px) {
            .landing-header h1 {
                font-size: 2rem;
            }

            .meeting-cards {
                grid-template-columns: 1fr;
                max-width: 400px;
            }
        }
    </style>
</head>

<body>
    <div class="landing-wrapper">
        <div class="landing-header">
            <div class="brand-icon">📅</div>
            <h1>MSC Meeting Scheduler</h1>
            <p>Choose your interview type to view available slots and book your time.</p>
        </div>

        <!-- Cards loaded dynamically -->
        <div class="meeting-cards" id="meetingCardsContainer">
            <div class="landing-loading">
                <div class="spinner"></div>
                <p>Loading interview types...</p>
            </div>
        </div>

        <div class="landing-footer">
            <p>MSC Meeting Scheduler · <a href="admin.html">Admin Dashboard</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/sheets-api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await sheetsAPI.init();

            const container = document.getElementById('meetingCardsContainer');

            try {
                const types = await sheetsAPI.getMeetingTypes();

                if (types.length === 0) {
                    container.innerHTML = `
                        <div class="landing-empty">
                            <div class="icon">📅</div>
                            <h3>No Interview Types Available</h3>
                            <p>Please check back later or contact the admin.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = types.map(mt => `
                    <a href="booking.html?type=${encodeURIComponent(mt.id)}" class="meeting-card">
                        <div class="card-icon">${mt.icon}</div>
                        <h2>${mt.name}</h2>
                        <p class="card-desc">${mt.description || mt.name}</p>
                        <div class="card-btn" style="background: linear-gradient(135deg, ${mt.color} 0%, ${darkenColor(mt.color)} 100%);">
                            Book Now <span class="arrow">→</span>
                        </div>
                    </a>
                `).join('');

            } catch (error) {
                console.error('Error loading meeting types:', error);
                container.innerHTML = `
                    <div class="landing-empty">
                        <div class="icon">⚠️</div>
                        <h3>Failed to Load</h3>
                        <p>Please try refreshing the page.</p>
                    </div>
                `;
            }
        });

        function darkenColor(hex, percent = 15) {
            hex = hex.replace('#', '');
            const r = Math.max(0, parseInt(hex.substring(0, 2), 16) - Math.round(2.55 * percent));
            const g = Math.max(0, parseInt(hex.substring(2, 4), 16) - Math.round(2.55 * percent));
            const b = Math.max(0, parseInt(hex.substring(4, 6), 16) - Math.round(2.55 * percent));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }
    </script>
</body>

</html>
