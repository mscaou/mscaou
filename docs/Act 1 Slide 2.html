<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Act 1 Slide 2 - Why That World Didn’t Scale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #203A5F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h2 {
            color: #165D9E;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            position: absolute;
            top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80%;
            height: 60%;
            position: relative;
        }

        .domain {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(32, 58, 95, 0.05);
            /* Light blue tint */
            border-radius: 12px;
            padding: 2rem;
            position: relative;
        }

        .domain-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #165D9E;
        }

        .domain-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .wall {
            width: 20px;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="18" height="8" fill="%23737373"/><rect x="0" y="10" width="18" height="8" fill="%23737373"/></svg>');
            background-size: 20px 20px;
            margin: 0 2rem;
            position: relative;
            z-index: 10;
        }

        .wall::after {
            content: "THE WALL";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            background: white;
            padding: 0 10px;
            font-weight: bold;
            color: #737373;
            font-size: 1rem;
            white-space: nowrap;
        }

        .particle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #165D9E;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            opacity: 0;
            z-index: 20;
        }

        /* Animation classes */
        .bounce-left {
            animation: bounceLeft 3s infinite;
        }

        .bounce-right {
            animation: bounceRight 3s infinite;
            animation-delay: 1.5s;
        }

        @keyframes bounceLeft {
            0% {
                left: 20%;
                top: 50%;
                opacity: 1;
                transform: scale(1);
            }

            40% {
                left: 45%;
                top: 50%;
                transform: scale(1.1);
            }

            50% {
                left: 45%;
                top: 50%;
                transform: scale(0.9);
                background: #d32f2f;
            }

            /* Hit wall, turn red */
            60% {
                left: 40%;
                top: 60%;
                transform: scale(1);
                background: #165D9E;
            }

            100% {
                left: 20%;
                top: 80%;
                opacity: 0;
            }
        }

        @keyframes bounceRight {
            0% {
                right: 20%;
                top: 40%;
                opacity: 1;
                transform: scale(1);
            }

            40% {
                right: 45%;
                top: 40%;
                transform: scale(1.1);
            }

            50% {
                right: 45%;
                top: 40%;
                transform: scale(0.9);
                background: #d32f2f;
            }

            60% {
                right: 40%;
                top: 30%;
                transform: scale(1);
                background: #165D9E;
            }

            100% {
                right: 20%;
                top: 20%;
                opacity: 0;
            }
        }

        .label {
            margin-top: 1rem;
            font-size: 1.2rem;
            color: #737373;
            text-align: center;
        }
    </style>
</head>

<body>

    <h2>Why That World Didn’t Scale</h2>

    <div class="container">
        <!-- Left Domain: Numbers/Logic -->
        <div class="domain">
            <div class="domain-title">Rigid Logic</div>
            <div class="domain-icon">🧮</div>
            <div class="label">Calculators, Algebra</div>
            <!-- Particles -->
            <div class="particle bounce-left" style="animation-delay: 0s;">Num</div>
            <div class="particle bounce-left" style="animation-delay: 1s;">Math</div>
        </div>

        <!-- The Wall -->
        <div class="wall"></div>

        <!-- Right Domain: Language/Nuance -->
        <div class="domain">
            <div class="domain-title">Nuance</div>
            <div class="domain-icon">📝</div>
            <div class="label">Email, Sentiment</div>
            <!-- Particles -->
            <div class="particle bounce-right" style="animation-delay: 0.5s;">Txt</div>
            <div class="particle bounce-right" style="animation-delay: 2s;">Emo</div>
        </div>
    </div>

    <script>
        // Optional: Add more dynamic particles
    </script>
</body>

</html>
