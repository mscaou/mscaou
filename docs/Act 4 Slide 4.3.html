<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Act 4 Slide 4.3 - Why Subwords Matter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #203A5F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h2 {
            color: #165D9E;
            font-size: 2.5rem;
            position: absolute;
            top: 20px;
        }

        .word-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4rem;
            position: relative;
            height: 100px;
        }

        .vocab-box {
            border: 2px dashed #737373;
            background: #FAFAFA;
            padding: 2rem;
            border-radius: 12px;
            width: 80%;
            text-align: center;
        }

        .vocab-title {
            color: #737373;
            margin-bottom: 1rem;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .vocab-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .token-chip {
            padding: 8px 16px;
            border-radius: 6px;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            opacity: 0.3;
            transition: all 0.5s;
        }

        .token-chip.active {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Subword Colors */
        .color-1 {
            background-color: #e57373;
        }

        .color-2 {
            background-color: #64b5f6;
        }

        .color-3 {
            background-color: #81c784;
        }

        .color-4 {
            background-color: #ffb74d;
        }

        .full-word {
            font-size: 3rem;
            font-weight: 700;
            color: #203A5F;
            display: flex;
            gap: 2px;
        }

        .part {
            padding: 5px;
            border-radius: 4px;
            transition: all 1s;
        }

        .part.split {
            margin: 0 10px;
            color: white;
        }
    </style>
</head>

<body>

    <h2>Why Subwords Matter</h2>

    <!-- The Word -->
    <div class="word-container">
        <div class="full-word">
            <div id="p1" class="part">Un</div>
            <div id="p2" class="part">friend</div>
            <div id="p3" class="part">li</div>
            <div id="p4" class="part">ness</div>
        </div>
    </div>

    <!-- The Vocabulary -->
    <div class="vocab-box">
        <div class="vocab-title">Model Vocabulary (Shared Parts)</div>
        <div class="vocab-list">
            <div class="token-chip color-1" id="v1">Un</div>
            <div class="token-chip color-2" id="v2">friend</div>
            <div class="token-chip" style="background:#ccc">cat</div>
            <div class="token-chip color-3" id="v3">li</div>
            <div class="token-chip" style="background:#ccc">ing</div>
            <div class="token-chip color-4" id="v4">ness</div>
        </div>
    </div>

    <script>
        const parts = [
            { el: document.getElementById('p1'), vocab: document.getElementById('v1'), color: '#e57373' },
            { el: document.getElementById('p2'), vocab: document.getElementById('v2'), color: '#64b5f6' },
            { el: document.getElementById('p3'), vocab: document.getElementById('v3'), color: '#81c784' },
            { el: document.getElementById('p4'), vocab: document.getElementById('v4'), color: '#ffb74d' }
        ];

        function animateSplit() {
            // Split phase
            parts.forEach(p => {
                p.el.classList.add('split');
                p.el.style.backgroundColor = p.color;
            });

            // Match phase
            setTimeout(() => {
                parts.forEach(p => {
                    p.vocab.classList.add('active');
                });
            }, 1000);

            // Reset
            setTimeout(() => {
                parts.forEach(p => {
                    p.el.classList.remove('split');
                    p.el.style.backgroundColor = 'transparent';
                    p.vocab.classList.remove('active');
                });

                setTimeout(animateSplit, 2000);
            }, 4000);
        }

        setTimeout(animateSplit, 1000);

    </script>
</body>

</html>
