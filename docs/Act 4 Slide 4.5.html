<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Act 4 Slide 4.5 - Embeddings: Tokens Become Vectors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #203A5F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h2 {
            color: #165D9E;
            font-size: 2.5rem;
            position: absolute;
            top: 20px;
        }

        .flow-container {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .box {
            padding: 2rem;
            background: #FAFAFA;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            text-align: center;
            min-width: 150px;
            position: relative;
        }

        .label {
            font-size: 1rem;
            color: #737373;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .value {
            font-size: 2rem;
            font-weight: 700;
            color: #203A5F;
        }

        .arrow {
            font-size: 3rem;
            color: #165D9E;
            animation: pulseArrow 2s infinite;
        }

        /* 3D Space Rep */
        .vector-box {
            font-family: monospace;
            font-size: 1.2rem;
            color: #165D9E;
            background: #E3F2FD;
            border-color: #165D9E;
        }

        .coordinates {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes pulseArrow {

            0%,
            100% {
                transform: translateX(0);
                opacity: 0.5;
            }

            50% {
                transform: translateX(5px);
                opacity: 1;
            }
        }

        .highlight {
            animation: pop 0.5s;
        }

        @keyframes pop {
            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>

    <h2>Embeddings: Tokens Become Vectors</h2>

    <div class="flow-container">

        <!-- Token ID -->
        <div class="box">
            <div class="label">Token ID</div>
            <div class="value" id="tokenId">1024</div>
        </div>

        <div class="arrow">→</div>

        <!-- Lookup Table (Abstract) -->
        <div class="box" style="background: #203A5F; color: white;">
            <div class="label" style="color: #cfd8dc;">Lookup Table</div>
            <div class="value"><i class="fas fa-table"></i></div>
        </div>

        <div class="arrow">→</div>

        <!-- Vector -->
        <div class="box vector-box">
            <div class="label">Vector</div>
            <div class="value coordinates" id="vectorVal">
                [0.12, -0.5, 0.99]
            </div>
        </div>

    </div>

    <script>
        const data = [
            { id: 1024, vec: "[0.12, -0.5, 0.99]" },
            { id: 4521, vec: "[-0.3, 0.88, 0.11]" },
            { id: 99, vec: "[0.01, 0.02, -0.1]" }
        ];

        let idx = 0;
        const tokenId = document.getElementById('tokenId');
        const vectorVal = document.getElementById('vectorVal');

        function cycle() {
            idx = (idx + 1) % data.length;

            // Animate out
            tokenId.style.opacity = 0;
            vectorVal.style.opacity = 0;

            setTimeout(() => {
                tokenId.innerText = data[idx].id;
                vectorVal.innerText = data[idx].vec;

                tokenId.style.opacity = 1;
                vectorVal.style.opacity = 1;
                tokenId.classList.add('highlight');
                vectorVal.classList.add('highlight');

                setTimeout(() => {
                    tokenId.classList.remove('highlight');
                    vectorVal.classList.remove('highlight');
                }, 500);

            }, 500);
        }

        setInterval(cycle, 3000);

    </script>
</body>

</html>
