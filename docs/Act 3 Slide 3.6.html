<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Act 3 Slide 3.6 - The Correct Mental Model</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h2 {
            color: #4fc3f7;
            /* Lighter blue for dark mode */
            font-size: 2.5rem;
            position: absolute;
            top: 20px;
        }

        .timeline-container {
            position: relative;
            width: 80%;
            height: 200px;
            display: flex;
            align-items: center;
        }

        .line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: #555;
            z-index: 0;
        }

        .past-block {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #4fc3f7;
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            position: relative;
            z-index: 10;
            margin-right: 10px;
            font-size: 1.5rem;
        }

        .future-fog {
            flex: 1;
            height: 100px;
            background: linear-gradient(90deg, transparent, #1a1a1a);
            position: relative;
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            color: #555;
            overflow: hidden;
        }

        .cursor-head {
            width: 10px;
            height: 40px;
            background: #4fc3f7;
            box-shadow: 0 0 20px #4fc3f7, 0 0 40px #4fc3f7;
            animation: pulseCursor 2s infinite;
        }

        @keyframes pulseCursor {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .label-past {
            position: absolute;
            top: -40px;
            left: 10px;
            color: #4fc3f7;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .label-future {
            position: absolute;
            top: -40px;
            right: 10px;
            color: #555;
            font-size: 1rem;
            text-transform: uppercase;
        }

        /* Animated Text */
        .generated-word {
            animation: fadeIn 0.5s forwards;
            margin-right: 10px;
            color: #81d4fa;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <h2>The Correct Mental Model</h2>

    <div class="timeline-container">
        <span class="label-past">Past (Fixed Context)</span>
        <span class="label-future">Future (Undefined)</span>

        <div class="line"></div>

        <div class="past-block">The</div>
        <div class="past-block">model</div>
        <div class="past-block">predicts</div>

        <div id="dynamic-area" style="display:flex; align-items:center;">
            <!-- Generated words go here -->
        </div>

        <div class="cursor-head"></div>
        <div class="future-fog">???????????</div>
    </div>

    <script>
        const words = ["one", "token", "at", "a", "time"];
        const container = document.getElementById('dynamic-area');

        function addWord(index) {
            if (index < words.length) {
                const span = document.createElement('div');
                span.className = 'past-block generated-word';
                span.innerText = words[index];
                container.appendChild(span);

                setTimeout(() => addWord(index + 1), 1000);
            } else {
                // Loop
                setTimeout(() => {
                    container.innerHTML = '';
                    addWord(0);
                }, 3000);
            }
        }

        setTimeout(() => addWord(0), 1000);
    </script>
</body>

</html>
