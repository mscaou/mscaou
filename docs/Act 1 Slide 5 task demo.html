<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble { opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
        .chat-bubble.show { opacity: 1; transform: translateY(0); }
        .glow-box { transition: box-shadow 0.3s ease; }
        .glow-active { box-shadow: 0 0 20px #165D9E; border-color: #165D9E !important; }
        .loader { width: 20px; height: 20px; border: 3px solid #EAEAEA; border-top: 3px solid #165D9E; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-white p-4 font-sans h-screen flex flex-col items-center justify-center">

    <div class="w-full max-w-xl bg-[#EAEAEA] rounded-2xl overflow-hidden shadow-2xl flex flex-col h-[500px]">
        <!-- Header -->
        <div class="bg-[#203A5F] p-4 text-white flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-400 rounded-full"></div>
                <span class="font-bold tracking-tight">One Model, Many Behaviors</span>
            </div>
            <span class="text-xs opacity-70">Unified Interface</span>
        </div>

        <!-- Messages Area -->
        <div id="chatArea" class="flex-1 p-6 overflow-y-auto space-y-4 flex flex-col">
            <div class="text-center text-[#737373] text-xs py-2 uppercase tracking-widest border-b border-gray-300 mb-4">
                Instruction defines behavior
            </div>
            <!-- Bubbles will appear here -->
        </div>

        <!-- Controls -->
        <div class="p-4 bg-white border-t border-gray-200">
            <div class="text-xs text-[#737373] mb-2 font-bold uppercase tracking-wider">Select an Instruction:</div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="triggerTask('translate')" class="px-3 py-2 text-xs bg-[#EAEAEA] hover:bg-[#165D9E] hover:text-white rounded-lg transition-colors font-bold text-[#203A5F]">Translate</button>
                <button onclick="triggerTask('summarize')" class="px-3 py-2 text-xs bg-[#EAEAEA] hover:bg-[#165D9E] hover:text-white rounded-lg transition-colors font-bold text-[#203A5F]">Summarize</button>
                <button onclick="triggerTask('debug')" class="px-3 py-2 text-xs bg-[#EAEAEA] hover:bg-[#165D9E] hover:text-white rounded-lg transition-colors font-bold text-[#203A5F]">Debug Code</button>
            </div>
        </div>
    </div>

    <div class="mt-6 text-center text-[#737373] max-w-md">
        <p class="text-sm">Notice: The <strong>interface</strong> stays exactly the same. Only the <strong>language instruction</strong> changes, reconfiguring the system instantly.</p>
    </div>

    <script>
        const responses = {
            translate: {
                user: "Translate 'Hello world' to French.",
                bot: "Bonjour le monde."
            },
            summarize: {
                user: "Summarize this: LLMs are neural networks trained on vast amounts of text to predict the next word.",
                bot: "LLMs predict the next word using large-scale text training."
            },
            debug: {
                user: "Find the error: print(hello world)",
                bot: "Missing quotes. Use: print('hello world')"
            }
        };

        function triggerTask(type) {
            const area = document.getElementById('chatArea');
            area.innerHTML = ''; // Clear to focus on the single task shift

            // User Prompt
            const uDiv = document.createElement('div');
            uDiv.className = "self-end bg-[#165D9E] text-white p-3 rounded-2xl rounded-tr-none max-w-[80%] chat-bubble show text-sm";
            uDiv.innerText = responses[type].user;
            area.appendChild(uDiv);

            // Bot Response (delayed)
            setTimeout(() => {
                const bDiv = document.createElement('div');
                bDiv.className = "self-start bg-white border border-gray-200 p-3 rounded-2xl rounded-tl-none max-w-[80%] chat-bubble show text-sm text-[#203A5F] shadow-sm font-medium";
                bDiv.innerText = responses[type].bot;
                area.appendChild(bDiv);
                area.scrollTop = area.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
